<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores VT — Lumar Telecom</title>
<meta name="theme-color" content="#EE2924">
<meta name="description" content="Painel de indicadores de desempenho da equipe de técnicos de manutenção — Lumar Telecom / Claro">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./assets/icon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script>
window.addEventListener('load', function(){
  if(typeof XLSXStyle !== 'undefined' && typeof XLSX === 'undefined') window.XLSX = XLSXStyle;
});
</script>

<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen"></div>

<!-- APP SHELL -->
<div class="app-shell" style="display:none">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">L</div>
      <div class="brand-text">
        <b>Indicadores VT</b>
        <span>Lumar Telecom · TSA-Lumar-VT</span>
      </div>
      <button class="icon-btn" id="btn-toggle-sidebar" style="margin-left:auto"><span class="material-symbols-rounded">menu_open</span></button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group-title">Operação</div>
      <button class="nav-item active" data-nav="dashboard"><span class="material-symbols-rounded icon">dashboard</span><span class="label">Dashboard Global</span></button>
      <button class="nav-item" data-nav="technicians"><span class="material-symbols-rounded icon">groups</span><span class="label">Técnicos</span></button>
      <button class="nav-item" data-nav="production"><span class="material-symbols-rounded icon">assignment_turned_in</span><span class="label">Produção Diária</span></button>
      <button class="nav-item" data-nav="consultivo"><span class="material-symbols-rounded icon">monetization_on</span><span class="label">Consultivo</span></button>

      <div class="nav-group-title">Gestão de Equipe</div>
      <button class="nav-item" data-nav="shifts"><span class="material-symbols-rounded icon">event_available</span><span class="label">Plantões</span></button>
      <button class="nav-item" data-nav="vacations"><span class="material-symbols-rounded icon">beach_access</span><span class="label">Férias</span></button>
      <button class="nav-item" data-nav="ranking"><span class="material-symbols-rounded icon">emoji_events</span><span class="label">Ranking</span></button>

      <div class="nav-group-title">Sistema</div>
      <button class="nav-item" data-nav="reports"><span class="material-symbols-rounded icon">summarize</span><span class="label">Relatórios</span></button>
      <button class="nav-item" data-nav="admin"><span class="material-symbols-rounded icon">admin_panel_settings</span><span class="label">Administração</span></button>
    </nav>

    <div class="sidebar-footer">
      <div class="avatar" id="sidebar-avatar">--</div>
      <div class="who hidden-toggle">
        <b id="sidebar-who-name">—</b>
        <span id="sidebar-who-role">—</span>
      </div>
      <button class="icon-btn" id="btn-logout" title="Sair" style="margin-left:auto"><span class="material-symbols-rounded">logout</span></button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn" id="btn-mobile-sidebar" style="display:none"><span class="material-symbols-rounded">menu</span></button>
      <div class="search-box">
        <span class="material-symbols-rounded icon">search</span>
        <input type="text" id="global-search" placeholder="Buscar técnico, matrícula...">
      </div>
      <div class="topbar-actions">
        <span class="pill live">Tempo Real</span>
        <div class="alerts-wrap">
          <button class="icon-btn" id="btn-alerts" style="position:relative">
            <span class="material-symbols-rounded">notifications</span>
            <span class="badge hidden" id="alerts-badge" style="position:absolute; top:2px; right:2px; background:var(--red); color:#fff; font-size:9px; font-weight:800; border-radius:999px; padding:1px 5px"></span>
          </button>
          <div class="alerts-dropdown" id="alerts-dropdown"></div>
        </div>
        <button class="icon-btn" id="btn-dark-mode"><span class="material-symbols-rounded">dark_mode</span></button>
      </div>
    </header>

    <div class="viewport">
      <div class="view active" id="view-dashboard"></div>
      <div class="view" id="view-technicians"></div>
      <div class="view" id="view-technician-profile"></div>
      <div class="view" id="view-production"></div>
      <div class="view" id="view-consultivo"></div>
      <div class="view" id="view-shifts"></div>
      <div class="view" id="view-vacations"></div>
      <div class="view" id="view-ranking"></div>
      <div class="view" id="view-reports"></div>
      <div class="view" id="view-admin"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head"><h3 id="modal-title"></h3><button class="icon-btn" onclick="closeModal()"><span class="material-symbols-rounded">close</span></button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<!-- TOASTS -->
<div id="toast-container"></div>

<script src="./js/data.js"></script>
<script src="./js/sync.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/charts.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/alerts.js"></script>
<script src="./js/views/ranking.js"></script>
<script src="./js/views/dashboard.js"></script>
<script src="./js/views/technicians.js"></script>
<script src="./js/views/production.js"></script>
<script src="./js/views/consultivo.js"></script>
<script src="./js/views/shifts.js"></script>
<script src="./js/views/vacations.js"></script>
<script src="./js/views/reports.js"></script>
<script src="./js/views/admin.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
